name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show active-toolchain
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Run tests and JSON Schema validation
        run: cargo test --workspace
      - name: Check shell syntax
        run: bash -n scripts/*.sh
      - name: Build CUDA probe when toolkit is available
        run: |
          if command -v nvcc >/dev/null 2>&1 && command -v cmake >/dev/null 2>&1; then
            ./scripts/build_probe.sh
          else
            echo "CUDA toolkit unavailable; skipping optional probe build."
          fi
